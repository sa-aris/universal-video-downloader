<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universal Video Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 28px;
      text-align: center;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 20px;
      width: 100%;
      max-width: 480px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    input[type="text"] {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 11px 14px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #555; }
    input[type="text"]::placeholder { color: #444; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 11px 16px;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:not(:disabled):active { opacity: 0.75; }

    .btn-info { background: #2a2a2a; color: #ccc; }
    .btn-download { background: #2563eb; color: #fff; width: 100%; padding: 13px; font-size: 1rem; }

    .options {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    select {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
    }
    .toggle-row input { accent-color: #2563eb; width: 16px; height: 16px; cursor: pointer; }
    .toggle-row label { font-size: 0.85rem; color: #aaa; cursor: pointer; }

    .info-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
      display: none;
    }
    .info-box.visible { display: block; }

    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      padding: 3px 0;
    }
    .info-row span:first-child { color: #555; }
    .info-row span:last-child { color: #ccc; font-weight: 500; max-width: 65%; text-align: right; word-break: break-word; }

    .status {
      font-size: 0.8rem;
      text-align: center;
      min-height: 18px;
      margin-bottom: 10px;
      color: #666;
    }
    .status.error { color: #f87171; }
    .status.loading { color: #60a5fa; }
    .status.success { color: #34d399; }

    .divider { border: none; border-top: 1px solid #2a2a2a; margin: 14px 0; }
  </style>
</head>
<body>

  <h1>Universal Video Downloader</h1>
  <p class="subtitle">YouTube, Vimeo, Twitter/X, TikTok & 1000+ platforms</p>

  <div class="card">
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="Paste video URL..." autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="btn-info" id="infoBtn" onclick="fetchInfo()">Info</button>
    </div>

    <div class="info-box" id="infoBox">
      <div class="info-row"><span>Title</span><span id="iTitle">—</span></div>
      <div class="info-row"><span>Channel</span><span id="iChannel">—</span></div>
      <div class="info-row"><span>Duration</span><span id="iDuration">—</span></div>
      <div class="info-row"><span>Platform</span><span id="iPlatform">—</span></div>
    </div>

    <div class="options">
      <select id="quality">
        <option value="best">Best quality</option>
        <option value="1080p">1080p</option>
        <option value="720p">720p</option>
        <option value="480p">480p</option>
      </select>

      <div class="toggle-row" onclick="toggleAudio()">
        <input type="checkbox" id="audioOnly" />
        <label for="audioOnly">Audio only (MP3)</label>
      </div>
    </div>

    <div class="status" id="status"></div>

    <button class="btn-download" id="dlBtn" onclick="startDownload()">Download</button>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    function toggleAudio() {
      const cb = $('audioOnly');
      cb.checked = !cb.checked;
      $('quality').disabled = cb.checked;
    }

    function setStatus(msg, type = '') {
      const el = $('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    function fmtDuration(s) {
      if (!s) return 'unknown';
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
      return h ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
               : `${m}:${String(sec).padStart(2,'0')}`;
    }

    async function fetchInfo() {
      const url = $('urlInput').value.trim();
      if (!url) return;

      $('infoBtn').disabled = true;
      setStatus('Fetching info...', 'loading');

      try {
        const res = await fetch('/info', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Error');

        $('iTitle').textContent    = data.title    || '—';
        $('iChannel').textContent  = data.uploader || '—';
        $('iDuration').textContent = fmtDuration(data.duration);
        $('iPlatform').textContent = data.extractor || '—';
        $('infoBox').classList.add('visible');
        setStatus('');
      } catch (e) {
        setStatus(e.message, 'error');
      } finally {
        $('infoBtn').disabled = false;
      }
    }

    async function startDownload() {
      const url = $('urlInput').value.trim();
      if (!url) { setStatus('Please enter a URL.', 'error'); return; }

      $('dlBtn').disabled = true;
      setStatus('Downloading... this may take a moment.', 'loading');

      try {
        const res = await fetch('/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url,
            quality: $('quality').value,
            audio_only: $('audioOnly').checked
          })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Download failed');
        }

        const disposition = res.headers.get('content-disposition') || '';
        const match = disposition.match(/filename\*?=(?:UTF-8'')?["']?([^"';\n]+)/i);
        const filename = match ? decodeURIComponent(match[1]) : 'video';

        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);

        setStatus('Done! Check your downloads.', 'success');
      } catch (e) {
        setStatus(e.message, 'error');
      } finally {
        $('dlBtn').disabled = false;
      }
    }

    $('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchInfo();
    });
  </script>
</body>
</html>
